# ===== Display =====
# Enable the nice!view display (the e-ink-style screens on each half)
CONFIG_ZMK_DISPLAY=y

# ===== Sleep / Power =====
# Allow the keyboard to enter deep sleep when idle (huge battery savings)
CONFIG_ZMK_SLEEP=y
# Time before deep sleep kicks in (milliseconds). 30 minutes is comfortable.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ===== Bluetooth =====
# Increase BLE TX power slightly for better range/reliability (small battery cost)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ===== Future: ZMK Studio (commented out for now) =====
# Uncomment when we want live remapping. Requires a `snippet` in build.yaml too.
# CONFIG_ZMK_STUDIO=y
