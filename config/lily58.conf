# ============================================================
# Display & status screen
# ============================================================
# Enable the display subsystem
CONFIG_ZMK_DISPLAY=y

# Use the custom status screen (required for nice!oled widgets)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# ============================================================
# nice!oled module — main toggles
# ============================================================
# Disable nice!oled (this is for SSD1306 OLED screens, not nice!view)
CONFIG_NICE_OLED_ON=n

# Enable nice!epaper (this is the mode for nice!view screens)
CONFIG_NICE_EPAPER_ON=y

# ============================================================
# Central (left) screen widgets
# ============================================================
# Layer name
CONFIG_NICE_OLED_WIDGET_LAYER=y

# Modifier indicators (Ctrl/Shift/Opt/Cmd shown live)
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_MACOS=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_BOX=y

# HID indicators (for CapsLock state)
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS=y
CONFIG_ZMK_HID_INDICATORS=y

# Disable WPM widgets (you don't want these)
CONFIG_NICE_OLED_WIDGET_WPM=n
CONFIG_NICE_OLED_WIDGET_WPM_NUMBER=n
CONFIG_NICE_OLED_WIDGET_WPM_SPEEDOMETER=n
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=n
CONFIG_NICE_OLED_WIDGET_WPM_LUNA=n
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n

# Disable HID animations (just static CapsLock indicator, no Luna/Bongo)
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_HID_INDICATORS_BONGO_CAT=n

# Disable modifier animations (just clean fixed icons)
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_LUNA=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_BONGO_CAT=n

# ============================================================
# Peripheral (right) screen
# ============================================================
# Use static image (better battery), not animation
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=n
CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL_VIM=y

# Explicitly disable all animations
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_HEAD=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_POKEMON=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=n
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=n

# ============================================================
# RAW HID — disabled (would require host-side macOS app)
# ============================================================
CONFIG_NICE_OLED_WIDGET_RAW_HID=n

# ============================================================
# Sleep / Power
# ============================================================
# Allow deep sleep when idle
CONFIG_ZMK_SLEEP=y

# 15 minutes idle before deep sleep
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ============================================================
# Bluetooth
# ============================================================
# Boost BLE TX power slightly for better range/reliability
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
